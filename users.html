<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users & Premium - RafkaVL</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .control-panel { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; backdrop-filter: blur(8px);}
        .control-input, .control-select { flex: 1; min-width: 200px; background: var(--input-bg); border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 8px; font-size: 12px; outline: none; }
        .control-select { cursor: pointer; flex: 0 1 auto;}
        .user-name { color: var(--net-glow); font-weight: 700; font-size: 14px; }
        .user-id { color: var(--text-sub); font-family: monospace; font-size: 12px; font-weight: 400; }
        .money-text { color: var(--success); font-family: monospace; font-size: 13px; }
        .bank-text { color: var(--warn); font-family: monospace; font-size: 13px; }
        .badge-rank { background: var(--net); color: #fff; border-radius: 50%; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }
        .rank-1 { background: #ffcc00; color: #000; box-shadow: 0 0 10px #ffcc00;}
        .rank-2 { background: #c0c0c0; color: #000; }
        .rank-3 { background: #cd7f32; color: #000; }
    </style>
</head>
<body>

<script src="menu.js"></script>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h2 style="color:var(--net-glow);"><i class="fas fa-user-edit"></i> Edit Data User</h2>
        <div style="color: var(--text-sub); font-size: 12px; margin-bottom: 15px;" id="modal-user-info"></div>
        <input type="hidden" id="edit-jid">
        <div class="input-group"><label>Money (Uang)</label><input type="number" id="edit-money"></div><br>
        <div class="input-group"><label>Bank (Tabungan)</label><input type="number" id="edit-bank"></div><br>
        <div class="input-group"><label>Limit Harian</label><input type="number" id="edit-limit"></div><br>
        <div class="input-group"><label>XP (Experience)</label><input type="number" id="edit-exp"></div><br>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
            <input type="checkbox" id="edit-prem" style="width: 18px; height: 18px;">
            <label style="color: #fff; font-size: 13px;">Jadikan User Premium</label>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button class="btn-act btn-del" onclick="closeModal()" style="padding: 10px 15px;">Batal</button>
            <button class="btn-act" style="background: var(--net); padding: 10px 15px;" onclick="saveUserEdit()">Simpan Data</button>
        </div>
    </div>
</div>

<div class="container" id="main-content" style="display: block;">
    <div class="header">
        <h1><span class="menu-btn" onclick="toggleSidebar()">☰</span> <span style="color: var(--net-glow);">◆</span> LEADERBOARD PENGGUNA</h1>
        <div style="font-size: 10px; color: var(--text-sub);" id="sync-status">SINKRONISASI...</div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px;">
        <div class="stat-box"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3 id="tot-users">0</h3><p>Total User</p></div></div>
        <div class="stat-box"><div class="stat-icon" style="color: var(--warn); background: rgba(255, 204, 0, 0.1);"><i class="fas fa-crown"></i></div><div class="stat-info"><h3 id="tot-prem">0</h3><p>User Premium</p></div></div>
    </div>

    <div class="control-panel">
        <input type="text" id="search-user" class="control-input" placeholder="🔍 Cari Nama / Nomor WA...">
        <select id="filter-premium" class="control-select">
            <option value="all">🌐 Semua Akun</option><option value="premium">🌟 Khusus Premium</option><option value="regular">👤 Khusus Reguler</option>
        </select>
        <select id="sort-by" class="control-select">
            <option value="money">💰 Berdasarkan Uang</option><option value="bank">🏦 Berdasarkan Tabungan</option>
            <option value="chat">💬 Berdasarkan Chat</option><option value="limit">⚡ Berdasarkan Limit</option>
            <option value="level">🎚️ Berdasarkan Level</option><option value="join_date">📅 Berdasarkan Tgl Join</option>
        </select>
        <select id="sort-order" class="control-select">
            <option value="desc">⬇️ Tertinggi / Terbaru</option><option value="asc">⬆️ Terendah / Terlama</option>
        </select>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px; text-align: center;">Rank</th>
                    <th>Nama / Nomor WA</th>
                    <th>Status Akun</th>
                    <th>Level & Limit</th>
                    <th>Harta (Uang & Bank)</th>
                    <th>Total Chat</th>
                    <th style="text-align:center;">Aksi</th>
                </tr>
            </thead>
            <tbody id="list-users">
                <tr><td colspan="7" style="text-align:center; padding:40px; color: var(--text-sub);">Menarik data dari bot...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const isAdmin = localStorage.getItem('rafkavl_token') === 'AUTH_VALID_2026';
    const formatRupiah = (n) => 'Rp ' + (Number(n) || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    const formatTanggal = (ms) => { if (!ms) return '-'; const d = new Date(ms); return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`; };
    
    let isModalOpen = false; let globalUsers = []; 

    async function apiAction(action) { await fetch('/api/antena', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'RafkaVl_Botzz' }, body: JSON.stringify({ action }) }); }

    document.getElementById('search-user').addEventListener('input', renderUsers); document.getElementById('filter-premium').addEventListener('change', renderUsers);
    document.getElementById('sort-by').addEventListener('change', renderUsers); document.getElementById('sort-order').addEventListener('change', renderUsers);

    async function loadUsers() {
        if (isModalOpen) return; 
        try {
            const res = await fetch('/api/antena?t=' + Date.now()); const data = await res.json();
            if (data.status === 'offline') { document.getElementById('sync-status').innerText = "BOT OFFLINE 🔴"; return; }
            if (data.database && data.database.users) {
                globalUsers = data.database.users; document.getElementById('tot-users').innerText = globalUsers.length; document.getElementById('tot-prem').innerText = globalUsers.filter(u => u.premium).length;
                renderUsers(); document.getElementById('sync-status').innerText = "LIVE SYNC 🟢";
            }
        } catch (e) { }
    }

    function renderUsers() {
        const searchVal = document.getElementById('search-user').value.toLowerCase(); const filterPrem = document.getElementById('filter-premium').value;
        const sortBy = document.getElementById('sort-by').value; const sortOrder = document.getElementById('sort-order').value;

        let filteredData = globalUsers.filter(u => {
            const isMatchText = u.name.toLowerCase().includes(searchVal) || String(u.id).includes(searchVal);
            const isMatchPrem = filterPrem === 'all' || (filterPrem === 'premium' && u.premium) || (filterPrem === 'regular' && !u.premium);
            return isMatchText && isMatchPrem;
        });

        filteredData.sort((a, b) => { let valA = a[sortBy] || 0; let valB = b[sortBy] || 0; return sortOrder === 'desc' ? valB - valA : valA - valB; });

        let htmlContent = '';
        if (filteredData.length === 0) { htmlContent = `<tr><td colspan="7" style="text-align:center; padding:40px; color: var(--danger);">Data tidak ditemukan!</td></tr>`;
        } else {
            filteredData.forEach((u, index) => {
                let rankClass = 'badge-rank'; if(index === 0) rankClass += ' rank-1'; else if(index === 1) rankClass += ' rank-2'; else if(index === 2) rankClass += ' rank-3';
                const premClass = u.premium ? 'badge-prem' : 'badge-reg'; const premText = u.premium ? 'PREMIUM' : 'REGULER';
                let actionHtml = isAdmin ? `<button class="btn-act btn-edit" onclick="openModal('${u.id}', '${u.name.replace(/'/g, "\\'")}', ${u.money}, ${u.bank}, ${u.limit}, ${u.exp}, ${u.premium})"><i class="fas fa-edit"></i> Edit</button> <button class="btn-act btn-del" onclick="deleteUser('${u.id}', '${u.name.replace(/'/g, "\\'")}')"><i class="fas fa-trash"></i></button>` : `<span style="font-size:10px; color:var(--text-sub);"><i class="fas fa-lock"></i> Admin Only</span>`;

                htmlContent += `<tr>
                    <td style="text-align: center;"><span class="${rankClass}">${index + 1}</span></td>
                    <td><div class="user-name">${u.name}</div><div class="user-id"><i class="fab fa-whatsapp"></i> +${u.id}</div></td>
                    <td><span class="badge ${premClass}">${premText}</span><br><span style="font-size: 9px; color: var(--text-sub);">Join: ${formatTanggal(u.join_date)}</span></td>
                    <td><div><i class="fas fa-star" style="color:var(--net); font-size:10px;"></i> Lvl ${u.level} | XP: ${u.exp}</div><div style="font-size:11px; color:var(--text-sub);">Limit: ${u.limit}</div></td>
                    <td><div class="money-text"><i class="fas fa-wallet"></i> ${formatRupiah(u.money)}</div><div class="bank-text"><i class="fas fa-university"></i> ${formatRupiah(u.bank)}</div></td>
                    <td><div style="font-size:13px; font-weight:700; color:var(--net-glow);"><i class="fas fa-comment-dots"></i> ${u.chat} Pesan</div></td>
                    <td style="text-align:center;">${actionHtml}</td>
                </tr>`;
            });
        }
        document.getElementById('list-users').innerHTML = htmlContent;
    }

    function openModal(id, name, money, bank, limit, exp, prem) { if (!isAdmin) return; isModalOpen = true; document.getElementById('modal-user-info').innerText = `Target: ${name} (+${id})`; document.getElementById('edit-jid').value = id; document.getElementById('edit-money').value = money; document.getElementById('edit-bank').value = bank; document.getElementById('edit-limit').value = limit; document.getElementById('edit-exp').value = exp; document.getElementById('edit-prem').checked = prem; document.getElementById('editModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; isModalOpen = false; }
    function saveUserEdit() { if (!isAdmin) return; const id = document.getElementById('edit-jid').value; const data = { money: document.getElementById('edit-money').value, bank: document.getElementById('edit-bank').value, limit: document.getElementById('edit-limit').value, exp: document.getElementById('edit-exp').value, premium: document.getElementById('edit-prem').checked }; apiAction({ type: 'update_user', target: id, data: data }); alert(`✅ Data User +${id} berhasil diupdate!`); closeModal(); }
    function deleteUser(id, name) { if (!isAdmin) return; if(confirm(`⚠️ Hapus akun ${name} (+${id})? Semua hartanya akan hangus!`)) { apiAction({ type: 'delete_user', target: id }); alert(`🗑️ Akun ${name} dihapus!`); } }

    setInterval(loadUsers, 5000); loadUsers();
</script>
</body>
</html>
