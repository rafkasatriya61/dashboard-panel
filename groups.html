<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Management - RafkaVL</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .grup-name { color: var(--net); font-weight: 700; } .grup-id { color: var(--text-sub); font-family: monospace; font-size: 12px; font-weight: 400; } .sewa-hari { color: var(--warn); font-weight: 700; }
        .badge-aktif { color: var(--success); border: 1px solid var(--success); } .badge-banned { color: var(--danger); border: 1px solid var(--danger); }
        .detail-row { display: none; background: rgba(11, 19, 43, 0.7); border-bottom: 1px solid var(--border); backdrop-filter: blur(5px);} .detail-row.open { display: table-row; }
        .detail-content { padding: 25px; border-left: 3px solid var(--net); display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; } .info-box { background: var(--input-bg); padding: 12px 15px; border-radius: 8px; border: 1px solid #162445; } .info-box.full { grid-column: span 2; }
        .info-value { font-size: 13px; color: #fff; font-weight: 700; border: none; background: transparent; width: 100%; outline: none; } input.info-value { border-bottom: 1px solid var(--border); padding-bottom: 2px; }
        .feature-section { background: var(--input-bg); padding: 20px; border-radius: 12px; border: 1px solid #162445; }
        .feature-title { font-size: 12px; color: var(--net); font-weight: 700; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; display: flex; justify-content: space-between; }
        .feature-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 8px; } .feature-name { font-size: 11px; font-weight: 600; color: #fff; }
        .admin-actions { display: flex; gap: 10px; margin-top: 15px; } .btn-leave { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 11px; flex: 1; transition: 0.2s;}
        .bc-box { display: flex; gap: 10px; margin-top: 10px; } .bc-input { flex: 1; background: #0a1020; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; font-size: 12px; outline: none; } .bc-btn { background: #00cfff; color: #000; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .gcauto-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-top: 15px; }
    </style>
</head>
<body>

<script src="menu.js"></script>

<div class="container" style="display: block;">
    <div class="header">
        <h1><span class="menu-btn" onclick="toggleSidebar()">☰</span> <span style="color: var(--net);">◆</span> GROUP MANAGEMENT</h1>
        <div style="text-align: right;">
            <div id="count-gc" style="font-size: 20px; font-weight: 700; color: var(--net);">0</div>
            <div style="font-size: 9px; color: var(--text-sub); letter-spacing: 1px;" id="sync-status">SYNCING...</div>
        </div>
    </div>

    <div class="card hide" id="bc-all-card">
        <div class="feature-title" style="margin-bottom: 10px; color: #00cfff; border: none;">📢 Broadcast Global (Semua Grup)</div>
        <div class="bc-box"><input type="text" id="bc-all-text" class="bc-input" placeholder="Ketik pesan pengumuman untuk seluruh grup bot..."><button class="bc-btn" onclick="broadcastAll()"><i class="fas fa-paper-plane"></i> Kirim</button></div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr><th>Grup Name</th><th>Tipe Grup</th><th>Status Bot</th><th>Sisa Sewa</th><th>Aksi</th></tr>
            </thead>
            <tbody id="list-gc">
                <tr><td colspan="5" style="text-align:center; padding:40px; color: var(--text-sub);">Menarik data dari database bot...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const isAdmin = localStorage.getItem('rafkavl_token') === 'AUTH_VALID_2026';
    if (isAdmin) { document.getElementById('bc-all-card').classList.remove('hide'); }
    
    let cachedData = []; let expandedRows = new Set(); 
    function toggleDetail(index) { const row = document.getElementById(`detail-${index}`); const btn = document.getElementById(`btn-toggle-${index}`); if (expandedRows.has(index)) { expandedRows.delete(index); row.classList.remove('open'); btn.classList.remove('open'); } else { expandedRows.add(index); row.classList.add('open'); btn.classList.add('open'); } }
    const pad2 = (n) => String(n).padStart(2, '0');

    async function loadData() {
        if (expandedRows.size > 0) { document.getElementById('sync-status').innerText = "SYNC PAUSED (VIEWING)"; document.getElementById('sync-status').style.color = "var(--warn)"; return; }
        document.getElementById('sync-status').innerText = "AUTO SYNC ON"; document.getElementById('sync-status').style.color = "var(--success)";

        try {
            const res = await fetch('/api/antena?t=' + Date.now()); const data = await res.json();
            if (data.database && data.database.chats) {
                cachedData = data.database.chats; let htmlContent = ''; document.getElementById('count-gc').innerText = cachedData.length;
                const days = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'];
                
                cachedData.forEach((g, index) => {
                    const statusClass = g.status.toUpperCase() === 'AKTIF' ? 'badge-aktif' : 'badge-banned';
                    const sewaColor = (g.sisa_sewa === 'NOT SET' || g.sisa_sewa === 'EXPIRED') ? 'var(--danger)' : 'var(--warn)';
                    const premClass = g.isPremium ? 'badge-prem' : 'badge-reg'; const s = g.settings || {}; const sec = g.security || {};

                    let gcAutoHtml = `<div class="gcauto-box"><div class="feature-title" style="border:none; margin-bottom:10px; color:#fff;">⏰ Jadwal Buka/Tutup (Per Hari)<label class="switch"><input type="checkbox" id="gcauto-active-${g.id}" ${sec.isActive ? 'checked' : ''} ${isAdmin ? '' : 'disabled'}><span class="slider" style="${isAdmin ? '' : 'cursor: not-allowed; opacity: 0.6;'}"></span></label></div><div style="display:grid; gap:8px;">`;
                    for(let i=1; i<=7; i++) {
                        let d = sec.daily && sec.daily[i] ? sec.daily[i] : null; let oTime = d && d.openHour != null ? `${pad2(d.openHour)}:${pad2(d.openMinute)}` : ''; let cTime = d && d.closeHour != null ? `${pad2(d.closeHour)}:${pad2(d.closeMinute)}` : '';
                        gcAutoHtml += `<div style="display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.5); padding:6px 12px; border-radius:6px; border: 1px solid rgba(255,255,255,0.05);"><span style="font-size:11px; width:50px; color:var(--text-sub);">${days[i-1]}</span><div style="display:flex; gap:5px; align-items:center;"><input type="time" id="gca-o-${g.id}-${i}" value="${oTime}" style="background:transparent; color:var(--success); border:1px solid var(--border); padding:3px 5px; border-radius:4px; font-size:11px; outline:none;" ${isAdmin ? '' : 'disabled'}><span style="font-size:10px; color:var(--text-sub);">s/d</span><input type="time" id="gca-c-${g.id}-${i}" value="${cTime}" style="background:transparent; color:var(--danger); border:1px solid var(--border); padding:3px 5px; border-radius:4px; font-size:11px; outline:none;" ${isAdmin ? '' : 'disabled'}></div></div>`;
                    }
                    gcAutoHtml += `</div>${isAdmin ? `<button class="btn-save" style="margin-top:15px; padding:10px; width:100%;" onclick="saveGcAuto('${g.id}')"><i class="fas fa-save"></i> Simpan Jadwal</button>` : ''}</div>`;

                    htmlContent += `<tr><td class="grup-name">${g.name}<br><span class="grup-id">${g.full_id}</span></td><td><span class="badge ${premClass}">${g.isPremium ? 'PREMIUM' : 'REGULER'}</span></td><td><span class="badge ${statusClass}">${g.status}</span></td><td class="sewa-hari" style="color: ${sewaColor};">${g.sisa_sewa}</td><td><button id="btn-toggle-${index}" class="btn-toggle" onclick="toggleDetail(${index})"><i class="fas fa-chevron-down"></i></button></td></tr>`;
                    htmlContent += `<tr id="detail-${index}" class="detail-row"><td colspan="5"><div class="detail-content"><div>
                                <div class="info-grid">
                                    <div class="info-box full"><div class="info-label">NAMA GRUP</div>${isAdmin ? `<input type="text" class="info-value" value="${g.name}" id="edit-name-${index}">` : `<div class="info-value">${g.name}</div>`}</div>
                                    <div class="info-box"><div class="info-label">SISA HARI</div><div class="info-value">${g.sisa_angka}</div></div><div class="info-box"><div class="info-label">TGL GABUNG</div><div class="info-value">${g.tgl_join}</div></div>
                                    <div class="info-box"><div class="info-label">CHAT HARI INI</div><div class="info-value" style="color: var(--net-glow);">${g.chat_today}</div></div><div class="info-box"><div class="info-label">TOTAL CHAT</div><div class="info-value" style="color: var(--net-glow);">${g.chat_all}</div></div>
                                </div>
                                ${isAdmin ? `<div class="admin-actions"><button class="btn-save" onclick="saveEdit(${index}, '${g.id}')"><i class="fas fa-save"></i> Ubah Nama</button><button class="btn-leave" onclick="leaveGroup('${g.id}')"><i class="fas fa-sign-out-alt"></i> Keluar</button></div><div style="margin-top: 15px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px;"><div class="info-label">📢 Kirim Pesan ke Grup Ini</div><div class="bc-box"><input type="text" id="bc-gc-${g.id}" class="bc-input" placeholder="Ketik pesan..."><button class="bc-btn" onclick="broadcastGroup('${g.id}')"><i class="fas fa-paper-plane"></i></button></div></div>` : ''}
                            </div>
                            <div class="feature-section"><div class="feature-title">⚙️ Kontrol Keamanan & Fitur Grup</div>
                                <div class="features-grid" style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));">
                                    ${createSwitch(g.id, 'Welcome', 'welcome', s.welcome)} ${createSwitch(g.id, 'Bye', 'bye', s.bye)} ${createSwitch(g.id, 'Anti Link', 'antilink', s.antilink)} ${createSwitch(g.id, 'Anti Link All', 'antilinkall', s.antilinkall)} ${createSwitch(g.id, 'Anti Video', 'antivideo', s.antivideo)} ${createSwitch(g.id, 'Anti Foto', 'antipoto', s.antipoto)} ${createSwitch(g.id, 'Anti Sticker', 'antisticker', s.antisticker)} ${createSwitch(g.id, 'Anti NSFW', 'antinsfw', s.antinsfw)} ${createSwitch(g.id, 'Anti Saluran', 'antisaluran', s.antisaluran)} ${createSwitch(g.id, 'Anti Nomor Luar', 'antinomorluar', s.antinomorluar)} ${createSwitch(g.id, 'Anti Upsw', 'antiupsw', s.antiupsw)} ${createSwitch(g.id, 'Anti Toxic', 'antitoxic', s.antitoxic)} ${createSwitch(g.id, 'Anti Delete', 'antidelete', s.antidelete)} ${createSwitch(g.id, 'Anti Edit Chat', 'antieditchat', s.antieditchat)} ${createSwitch(g.id, 'Anti Promo', 'antipromo', s.antipromo)} ${createSwitch(g.id, 'Anti Spam Chat', 'antispamchat', s.antispamchat)} ${createSwitch(g.id, 'Anti Hidetag', 'antihidetag', s.antihidetag)} ${createSwitch(g.id, 'Anti ALL', 'antiall', s.antiall)} ${createSwitch(g.id, 'Auto Levelup', 'autolevelup', s.autolevelup)} ${createSwitch(g.id, 'Auto Sticker', 'autosticker', s.autosticker)} ${createSwitch(g.id, 'Notif Gempa', 'notifgempa', s.notifgempa)}
                                </div>
                                ${gcAutoHtml}
                            </div>
                        </div></td></tr>`;
                });
                document.getElementById('list-gc').innerHTML = htmlContent;
            }
        } catch (e) { }
    }

    function createSwitch(groupId, label, featureKey, isChecked) { return `<div class="feature-item"><span class="feature-name">${label}</span><label class="switch"><input type="checkbox" ${isChecked ? 'checked' : ''} ${isAdmin ? `onchange="apiAction({type: 'toggle_group_feature', target: '${groupId}', feature: '${featureKey}', value: this.checked})"` : 'disabled'}><span class="slider" style="${isAdmin ? '' : 'cursor: not-allowed; opacity: 0.6;'}"></span></label></div>`; }
    async function apiAction(payloadData) { try { await fetch('/api/antena', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'RafkaVl_Botzz' }, body: JSON.stringify({ action: payloadData }) }); } catch(e) { alert("Gagal koneksi server."); } }

    function saveEdit(index, id) { const newName = document.getElementById(`edit-name-${index}`).value; if(newName.trim() !== '') { apiAction({ type: 'change_group_name', target: id, value: newName }); alert("Perintah ubah nama dikirim!"); } }
    function saveGcAuto(id) { const isActive = document.getElementById(`gcauto-active-${id}`).checked; let schedule = {}; for(let i=1; i<=7; i++) { let o = document.getElementById(`gca-o-${id}-${i}`).value; let c = document.getElementById(`gca-c-${id}-${i}`).value; if(o && c) schedule[i] = { open: o, close: c }; } apiAction({ type: 'update_gcauto', target: id, isActive: isActive, schedule: schedule }); alert("✅ Jadwal dikirim ke bot!"); }
    function leaveGroup(id) { if(confirm("Keluarkan bot dari grup ini?")) apiAction({ type: 'leave_gc', target: id }); }
    function broadcastAll() { const text = document.getElementById('bc-all-text').value; if(text.trim() === '') return alert("Pesan kosong!"); if(confirm("Kirim ke SEMUA GRUP?")) { apiAction({ type: 'broadcast_all', text: text }); document.getElementById('bc-all-text').value = ''; alert("Broadcast diproses bot!"); } }
    function broadcastGroup(id) { const text = document.getElementById(`bc-gc-${id}`).value; if(text.trim() === '') return alert("Pesan kosong!"); apiAction({ type: 'broadcast_group', target: id, text: text }); document.getElementById(`bc-gc-${id}`).value = ''; alert("Pesan dikirim!"); }

    loadData(); setInterval(loadData, 5000); 
</script>
</body>
</html>
