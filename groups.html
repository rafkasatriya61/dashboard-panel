<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Management - RafkaVL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #060c1c; --card-bg: #0e1830; --border: #1e3060; --net: #00cfff; --success: #00e676; --danger: #ff4455; --text-sub: #8ab0d8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; padding: 20px; overflow-x: hidden; }
        
        /* SIDEBAR */
        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background: #0a1020; border-right: 1px solid var(--border); z-index: 1000; transition: 0.3s; padding: 20px; }
        #sidebar.active { left: 0; }
        .sidebar-links a { display: block; padding: 12px; color: var(--text-sub); text-decoration: none; border-radius: 8px; margin-bottom: 5px; font-weight: 600; }
        .sidebar-links a:hover, .sidebar-links a.active { background: rgba(0, 207, 255, 0.1); color: var(--net); }

        /* CONTENT */
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .header h1 span { color: var(--net); }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 15px; color: var(--text-sub); font-size: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-active { background: rgba(0, 230, 118, 0.1); color: var(--success); border: 1px solid var(--success); }
        .badge-banned { background: rgba(255, 68, 85, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        
        .btn-detail { background: rgba(0, 207, 255, 0.1); color: var(--net); border: 1px solid var(--net); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .btn-detail:hover { background: var(--net); color: #000; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        #overlay.active { display: block; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>
<div id="sidebar">
    <h2 style="color:var(--net); margin-bottom:30px;">👑 RafkaVL Menu</h2>
    <div class="sidebar-links">
        <a href="index.html">📊 Dashboard</a>
        <a href="groups.html" class="active">👥 Groups Database</a>
        <a href="users.html">👤 Users & Limit</a>
        <a href="settings.html">⚙️ Settings</a>
        <a href="login.html" style="color:var(--danger); margin-top:30px;">🔒 Logout</a>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1><span onclick="toggleSidebar()" style="cursor:pointer;">☰</span> <span>◆</span> GROUP MANAGEMENT</h1>
        <div style="text-align:right;">
            <div id="count-gc" style="font-size:24px; font-weight:bold; color:var(--net);">0</div>
            <p style="font-size:10px; color:var(--text-sub);">GROUPS CONNECTED</p>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Grup Name</th>
                    <th>ID WhatsApp</th>
                    <th>Members</th>
                    <th>Status</th>
                    <th>Masa Sewa</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="list-gc">
                <tr><td colspan="6" style="text-align:center; padding:50px;">Menghubungkan ke Bot Rafka...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function loadData() {
        try {
            const res = await fetch('/api/antena');
            const data = await res.json();
            const tbody = document.getElementById('list-gc');

            if (data.database && data.database.chats) {
                tbody.innerHTML = '';
                document.getElementById('count-gc').innerText = data.database.chats.length;
                
                data.database.chats.forEach(g => {
                    const statusClass = g.status === 'ACTIVE' ? 'badge-active' : 'badge-banned';
                    tbody.innerHTML += `
                        <tr>
                            <td><b style="color:var(--net)">${g.name}</b></td>
                            <td style="font-family:monospace; font-size:12px; color:var(--text-sub);">${g.id}</td>
                            <td>${g.member} User</td>
                            <td><span class="badge ${statusClass}">${g.status}</span></td>
                            <td style="color:#ffcc00; font-weight:bold;">${g.sisa_sewa}</td>
                            <td><button class="btn-detail" onclick="alert('Detail ${g.name} Segera Hadir')">Detail</button></td>
                        </tr>
                    `;
                });
            }
        } catch (e) { console.log("Fetch error..."); }
    }

    setInterval(loadData, 5000);
    loadData();
</script>
</body>
</html>
