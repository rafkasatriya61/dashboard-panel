<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Management - RafkaVL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #060c1c; --card-bg: #0e1830; --border: #1e3060; --net: #00cfff; --success: #00e676; --danger: #ff4455; --text-sub: #8ab0d8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; padding: 20px; overflow-x: hidden; }
        
        /* SIDEBAR */
        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background: #0a1020; border-right: 1px solid var(--border); z-index: 1000; transition: 0.3s; padding: 20px; }
        #sidebar.active { left: 0; }
        .sidebar-links a { display: block; padding: 12px; color: var(--text-sub); text-decoration: none; border-radius: 8px; margin-bottom: 5px; font-weight: 600; }
        .sidebar-links a:hover, .sidebar-links a.active { background: rgba(0, 207, 255, 0.1); color: var(--net); }

        /* CONTENT */
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 15px; color: var(--text-sub); font-size: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-active { background: rgba(0, 230, 118, 0.1); color: var(--success); border: 1px solid var(--success); }
        .badge-banned { background: rgba(255, 68, 85, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        
        .btn-detail { background: rgba(0, 207, 255, 0.1); color: var(--net); border: 1px solid var(--net); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-detail:hover { background: var(--net); color: #000; }

        /* MODAL DETAIL (POKOK PERSIS SS) */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; backdrop-filter: blur(5px); }
        .modal-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; background: #0e1830; border: 1px solid var(--border); border-radius: 20px; z-index: 2001; padding: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1e3060; padding-bottom: 15px; }
        .modal-body { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .info-item { background: #0a1329; border: 1px solid #1a2e50; padding: 12px; border-radius: 12px; }
        .info-item label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .info-item span, .info-item input { font-size: 14px; font-weight: bold; color: #fff; background: transparent; border: none; width: 100%; outline: none; }
        .full-width { grid-column: span 2; }

        .btn-save { grid-column: span 2; background: var(--net); color: #000; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { box-shadow: 0 0 15px var(--net); }
        .btn-leave { grid-column: span 2; background: rgba(255, 68, 85, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>
<div id="modal-overlay" onclick="closeModal()"></div>

<div id="modal-box" class="modal-box" style="display: none;">
    <div class="modal-header">
        <h3 id="modal-title">Detail Grup</h3>
        <span onclick="closeModal()" style="cursor:pointer; color:var(--text-sub);">&times;</span>
    </div>
    <div class="modal-body" id="modal-content">
        </div>
</div>

<div id="sidebar">
    <h2 style="color:var(--net); margin-bottom:30px;">👑 RafkaVL Menu</h2>
    <div class="sidebar-links">
        <a href="index.html">📊 Dashboard</a>
        <a href="groups.html" class="active">👥 Groups Database</a>
        <a href="users.html">👤 Users & Limit</a>
        <a href="settings.html">⚙️ Settings</a>
        <a href="login.html" style="color:var(--danger); margin-top:30px;">🔒 Logout</a>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1><span onclick="toggleSidebar()" style="cursor:pointer;">☰</span> <span>◆</span> GROUP MANAGEMENT</h1>
        <div style="text-align:right;">
            <div id="count-gc" style="font-size:24px; font-weight:bold; color:var(--net);">0</div>
            <p style="font-size:10px; color:var(--text-sub);">GROUPS CONNECTED</p>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Grup Name</th>
                    <th>ID WhatsApp</th>
                    <th>Members</th>
                    <th>Status</th>
                    <th>Masa Sewa</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="list-gc">
                </tbody>
        </table>
    </div>
</div>

<script>
    let cachedData = [];
    let isAdmin = true; // Anggap saja Mas Rafka admin (Nanti hubungkan ke login)

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function closeModal() {
        document.getElementById('modal-box').style.display = 'none';
        document.getElementById('modal-overlay').style.display = 'none';
    }

    async function loadData() {
        try {
            const res = await fetch('/api/antena');
            const data = await res.json();
            if (data.database && data.database.chats) {
                cachedData = data.database.chats;
                const tbody = document.getElementById('list-gc');
                tbody.innerHTML = '';
                document.getElementById('count-gc').innerText = cachedData.length;
                
                cachedData.forEach((g, index) => {
                    const statusClass = g.status === 'ACTIVE' ? 'badge-active' : 'badge-banned';
                    tbody.innerHTML += `
                        <tr>
                            <td><b style="color:var(--net)">${g.name}</b></td>
                            <td style="font-family:monospace; font-size:12px; color:var(--text-sub);">${g.id}</td>
                            <td>${g.member} User</td>
                            <td><span class="badge ${statusClass}">${g.status}</span></td>
                            <td style="color:#ffcc00; font-weight:bold;">${g.sisa_sewa}</td>
                            <td><button class="btn-detail" onclick="showDetail(${index})">Detail</button></td>
                        </tr>
                    `;
                });
            }
        } catch (e) { console.log(e); }
    }

    function showDetail(index) {
        const g = cachedData[index];
        document.getElementById('modal-title').innerText = "Detail Grup: " + g.name;
        
        let content = `
            <div class="info-item full-width"><label>NAMA</label>
                ${isAdmin ? `<input type="text" value="${g.name}" id="edit-name">` : `<span>${g.name}</span>`}
            </div>
            <div class="info-item"><label>STATUS</label><span>${g.status}</span></div>
            <div class="info-item"><label>SISA HARI</label><span>${g.sisa_sewa}</span></div>
            <div class="info-item"><label>TANGGAL GABUNG</label><span>${g.last_activity || '-'}</span></div>
            <div class="info-item"><label>ID WHATSAPP</label><span style="font-size:10px;">${g.id}</span></div>
            
            <div class="info-item full-width"><label>STATUS (Badge)</label>
                <span class="badge ${g.status === 'ACTIVE' ? 'badge-active' : 'badge-banned'}">${g.status}</span>
            </div>
        `;

        if(isAdmin) {
            content += `
                <button class="btn-save" onclick="saveEdit('${g.id}')">SIMPAN PERUBAHAN</button>
                <button class="btn-leave" onclick="leaveGroup('${g.id}')">KELUARKAN BOT DARI GRUP</button>
            `;
        }

        document.getElementById('modal-content').innerHTML = content;
        document.getElementById('modal-box').style.display = 'block';
        document.getElementById('modal-overlay').style.display = 'block';
    }

    async function saveEdit(id) {
        const newName = document.getElementById('edit-name').value;
        alert("Bot Rafka akan mengubah nama grup ke: " + newName);
        // Nanti kirim perintah fetch ke API untuk diteruskan ke bot
    }

    async function leaveGroup(id) {
        if(confirm("Yakin ingin mengeluarkan bot dari grup ini?")) {
            // Kirim perintah action: 'leave_gc' ke bot
            alert("Perintah dikirim ke Bot!");
        }
    }

    loadData();
    setInterval(loadData, 10000); // Update tiap 10 detik
</script>
</body>
</html>
